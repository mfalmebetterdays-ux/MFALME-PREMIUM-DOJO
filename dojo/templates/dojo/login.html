{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sign In — Revision Dojo</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
:root{
  --sky:#eef6ff;--sky2:#d0e8fa;--ink:#1a2638;--ink2:#3b4d63;--ink3:#7088a0;
  --gold:#ffc107;--gold-dk:#e6a800;--navy:#1a3a6b;--blue:#1976d2;
  --red:#e53935;--green:#00b248;
  --r:10px;--r2:16px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:linear-gradient(155deg,var(--navy) 0%,#1565c0 55%,#0288d1 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-box{background:#fff;border-radius:22px;padding:28px 24px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.28)}
.auth-logo{font-family:'Fredoka One',cursive;font-size:26px;color:var(--navy);text-align:center;margin-bottom:4px}
.auth-logo span{color:var(--gold)}
.auth-tagline{font-size:12px;font-weight:700;color:var(--ink3);text-align:center;margin-bottom:22px}
.field-wrap{margin-bottom:16px}
.field-lbl{font-size:11px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;display:block}
.field-inp{width:100%;background:var(--sky);border:2.5px solid var(--sky2);border-radius:var(--r2);padding:12px 15px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:var(--navy);outline:none}
.field-inp:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(25,118,210,.12)}
.btn{font-family:'Fredoka One',cursive;font-size:17px;border:none;cursor:pointer;padding:12px 26px;border-radius:var(--r2);display:inline-flex;align-items:center;justify-content:center;gap:7px;width:100%;text-decoration:none}
.btn-gold{background:var(--gold);color:var(--navy);box-shadow:0 4px 0 var(--gold-dk)}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--gold-dk)}
.auth-switch{text-align:center;margin-top:14px;font-size:13px;font-weight:600;color:var(--ink2)}
.auth-switch a{color:var(--blue);cursor:pointer;font-weight:800;text-decoration:none}
.auth-switch a:hover{text-decoration:underline}
.auth-err{background:rgba(229,57,53,.08);border:1.5px solid rgba(229,57,53,.25);border-radius:var(--r);padding:9px 13px;font-size:12px;font-weight:800;color:var(--red);margin-bottom:12px;display:none}
.auth-err.on{display:block}
.forgot-link{text-align:right;margin-top:-8px;margin-bottom:16px}
.forgot-link a{font-size:12px;color:var(--blue);text-decoration:none;font-weight:700}
.forgot-link a:hover{text-decoration:underline}
.remember-me-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.remember-checkbox {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}
.remember-checkbox input {
  width: 16px;
  height: 16px;
  cursor: pointer;
  accent-color: var(--gold);
}
.remember-checkbox label {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink2);
  cursor: pointer;
}
.spinner{width:20px;height:20px;border:3px solid rgba(26,58,107,.2);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="auth-box">
  <div class="auth-logo">Revision<span>Dojo</span></div>
  <div class="auth-tagline">Welcome back, Student</div>
  
  <div class="auth-err" id="loginErr"></div>
  
  <div class="field-wrap">
    <label class="field-lbl">Email Address</label>
    <input class="field-inp" id="loginEmail" type="email" placeholder="your@email.com" autocomplete="email">
  </div>
  
  <div class="field-wrap">
    <label class="field-lbl">Password</label>
    <input class="field-inp" id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  
  <div class="remember-me-row">
    <label class="remember-checkbox">
      <input type="checkbox" id="rememberMe">
      <label for="rememberMe">Remember me</label>
    </label>
    <div class="forgot-link">
      <a href="{% url 'dojo:password_reset' %}">Forgot password?</a>
    </div>
  </div>
  
  <button class="btn btn-gold" id="btnLoginSubmit">
    <i class="fas fa-sign-in-alt"></i> Sign In
  </button>
  
  <div class="auth-switch">No account? <a href="{% url 'dojo:register' %}">Create one free</a></div>
  <div class="auth-switch" style="margin-top:6px"><a href="{% url 'dojo:home' %}">← Back to Home</a></div>
</div>

<script src="{% static 'dojo/js/csrf.js' %}"></script>
<script>
// Helper function to redirect based on student's curriculum
function redirectToDashboard(user) {
  console.log('Redirecting student:', user);
  
  // Check if student has curriculum set
  if (user.curriculum === 'cbc') {
    window.location.href = '/cbc-dashboard/';
  } else if (user.curriculum === '844') {
    window.location.href = '/844-dashboard/';
  } else if (user.curriculum === 'igcse') {
    window.location.href = '/igcse-dashboard/';
  } else if (user.curriculum === 'cambridge') {
    window.location.href = '/igcse-dashboard/';
  } else {
    // No curriculum set - redirect to setup profile
    window.location.href = '/setup-profile/';
  }
}

// Login submission
document.getElementById('btnLoginSubmit').addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  const rememberMe = document.getElementById('rememberMe').checked;
  const errDiv = document.getElementById('loginErr');
  
  errDiv.classList.remove('on');
  errDiv.textContent = '';
  
  // Validation
  if (!email) {
    errDiv.textContent = 'Please enter your email address';
    errDiv.classList.add('on');
    return;
  }
  
  if (!password) {
    errDiv.textContent = 'Please enter your password';
    errDiv.classList.add('on');
    return;
  }
  
  // Disable button and show loading
  const btn = document.getElementById('btnLoginSubmit');
  const originalText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Signing In...';
  
  try {
    const response = await fetch('/api/login/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ 
        email: email, 
        password: password, 
        role: 'student', 
        remember_me: rememberMe 
      })
    });
    
    const data = await response.json();
    
    if (data.error) {
      errDiv.textContent = data.error;
      errDiv.classList.add('on');
      btn.disabled = false;
      btn.innerHTML = originalText;
      return;
    }
    
    // Successful login - redirect based on curriculum
    if (data.user) {
      redirectToDashboard(data.user);
    } else {
      // Fallback - get user info
      const meResponse = await fetch('/api/me/', {
        credentials: 'include'
      });
      const meData = await meResponse.json();
      if (meData.user) {
        redirectToDashboard(meData.user);
      } else {
        window.location.href = '/';
      }
    }
    
  } catch (error) {
    console.error('Login error:', error);
    errDiv.textContent = 'Network error. Please check your connection and try again.';
    errDiv.classList.add('on');
    btn.disabled = false;
    btn.innerHTML = originalText;
  }
});

// Enter key support
document.getElementById('loginPass').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    document.getElementById('btnLoginSubmit').click();
  }
});

document.getElementById('loginEmail').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    document.getElementById('btnLoginSubmit').click();
  }
});

// Auto-focus on email field
document.getElementById('loginEmail').focus();
</script>
</body>
</html>

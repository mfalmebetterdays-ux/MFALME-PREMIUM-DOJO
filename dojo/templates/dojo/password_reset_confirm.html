{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Set New Password — Revision Dojo</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
:root{
  --sky:#eef6ff;--sky2:#d0e8fa;--ink:#1a2638;--ink2:#3b4d63;--ink3:#7088a0;
  --gold:#ffc107;--gold-dk:#e6a800;--navy:#1a3a6b;--blue:#1976d2;
  --red:#e53935;--green:#00b248;
  --r:10px;--r2:16px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:linear-gradient(155deg,var(--navy) 0%,#1565c0 55%,#0288d1 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-box{background:#fff;border-radius:22px;padding:28px 24px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.28)}
.auth-logo{font-family:'Fredoka One',cursive;font-size:26px;color:var(--navy);text-align:center;margin-bottom:4px}
.auth-logo span{color:var(--gold)}
.auth-tagline{font-size:12px;font-weight:700;color:var(--ink3);text-align:center;margin-bottom:22px}
.field-wrap{margin-bottom:16px}
.field-lbl{font-size:11px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;display:block}
.field-inp{width:100%;background:var(--sky);border:2.5px solid var(--sky2);border-radius:var(--r2);padding:12px 15px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:var(--navy);outline:none}
.field-inp:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(25,118,210,.12)}
.btn{font-family:'Fredoka One',cursive;font-size:17px;border:none;cursor:pointer;padding:12px 26px;border-radius:var(--r2);display:inline-flex;align-items:center;justify-content:center;gap:7px;width:100%;text-decoration:none;transition:transform .13s,box-shadow .13s}
.btn-gold{background:var(--gold);color:var(--navy);box-shadow:0 4px 0 var(--gold-dk)}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--gold-dk)}
.auth-switch{text-align:center;margin-top:14px;font-size:13px;font-weight:600;color:var(--ink2)}
.auth-switch a{color:var(--blue);cursor:pointer;font-weight:800;text-decoration:none}
.auth-switch a:hover{text-decoration:underline}
.auth-err{background:rgba(229,57,53,.08);border:1.5px solid rgba(229,57,53,.25);border-radius:var(--r);padding:9px 13px;font-size:12px;font-weight:800;color:var(--red);margin-bottom:12px;display:none}
.auth-err.on{display:block}
.auth-success{background:rgba(0,178,72,.08);border:1.5px solid rgba(0,178,72,.25);border-radius:var(--r);padding:9px 13px;font-size:12px;font-weight:800;color:var(--green);margin-bottom:12px;display:none}
.auth-success.on{display:block}
.password-requirements{font-size:11px;color:var(--ink3);margin-top:6px}
.spinner{width:20px;height:20px;border:3px solid rgba(26,58,107,.2);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="auth-box">
  <div class="auth-logo">Revision<span>Dojo</span></div>
  <div class="auth-tagline">Create new password</div>
  
  <div class="auth-err" id="errorMsg"></div>
  <div class="auth-success" id="successMsg"></div>
  
  <div class="field-wrap">
    <label class="field-lbl">New Password</label>
    <input class="field-inp" id="newPassword" type="password" placeholder="••••••••">
    <div class="password-requirements">Minimum 8 characters</div>
  </div>
  
  <div class="field-wrap">
    <label class="field-lbl">Confirm Password</label>
    <input class="field-inp" id="confirmPassword" type="password" placeholder="••••••••">
  </div>
  
  <button class="btn btn-gold" id="btnResetPassword">Reset Password</button>
  
  <div class="auth-switch"><a href="{% url 'dojo:login' %}">← Back to Sign In</a></div>
</div>

<script src="{% static 'dojo/js/csrf.js' %}"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');
const uid = urlParams.get('uid');

if (!token || !uid) {
  document.getElementById('errorMsg').textContent = 'Invalid or expired reset link. Please request a new one.';
  document.getElementById('errorMsg').classList.add('on');
  document.getElementById('btnResetPassword').disabled = true;
}

const btnReset = document.getElementById('btnResetPassword');
const newPass = document.getElementById('newPassword');
const confirmPass = document.getElementById('confirmPassword');
const errorMsg = document.getElementById('errorMsg');
const successMsg = document.getElementById('successMsg');

btnReset.addEventListener('click', async () => {
  errorMsg.classList.remove('on');
  successMsg.classList.remove('on');
  
  const password = newPass.value;
  const confirm = confirmPass.value;
  
  if (!password || !confirm) {
    errorMsg.textContent = 'Please fill in both password fields';
    errorMsg.classList.add('on');
    return;
  }
  
  if (password !== confirm) {
    errorMsg.textContent = 'Passwords do not match';
    errorMsg.classList.add('on');
    return;
  }
  
  if (password.length < 8) {
    errorMsg.textContent = 'Password must be at least 8 characters';
    errorMsg.classList.add('on');
    return;
  }
  
  btnReset.disabled = true;
  btnReset.innerHTML = '<div class="spinner"></div> Resetting...';
  
  try {
    const response = await fetch('/api/password-reset-confirm/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({
        uid: uid,
        token: token,
        new_password: password
      })
    });
    
    const data = await response.json();
    
    if (data.error) {
      errorMsg.textContent = data.error;
      errorMsg.classList.add('on');
      btnReset.disabled = false;
      btnReset.innerHTML = 'Reset Password';
      return;
    }
    
    successMsg.textContent = 'Password reset successful! Redirecting to login...';
    successMsg.classList.add('on');
    
    setTimeout(() => {
      window.location.href = '/login/';
    }, 2000);
    
  } catch(e) {
    errorMsg.textContent = 'Network error. Please try again.';
    errorMsg.classList.add('on');
    btnReset.disabled = false;
    btnReset.innerHTML = 'Reset Password';
  }
});

newPass.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') btnReset.click();
});
confirmPass.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') btnReset.click();
});
</script>
</body>
</html>

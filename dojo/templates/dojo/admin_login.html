{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Login — TimesTable Dojo</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
:root{
  --sky:#eef6ff;--sky2:#d0e8fa;
  --gold:#ffc107;--gold-dk:#e6a800;
  --navy:#1a3a6b;--navy2:#234d96;--navy3:#0d1f3a;
  --blue:#1976d2;
  --red:#e53935;--red-lt:rgba(229,57,53,.1);
  --green:#00b248;
  --r:10px;--r2:16px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:linear-gradient(145deg,var(--navy3) 0%,var(--navy) 50%,#1565c0 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:#fff;border-radius:24px;padding:44px 40px 36px;width:100%;max-width:420px;box-shadow:0 32px 80px rgba(0,0,0,.35);position:relative}
.login-badge{display:inline-flex;align-items:center;gap:6px;background:var(--red-lt);border:1.5px solid rgba(229,57,53,.25);color:var(--red);font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;border-radius:99px;padding:4px 12px;margin-bottom:18px}
.login-logo{font-family:'Fredoka One',cursive;font-size:30px;letter-spacing:1.5px;color:var(--navy);margin-bottom:4px}
.login-logo span{color:var(--gold)}
.login-sub{font-size:12px;font-weight:700;color:#7088a0;margin-bottom:28px}
.login-field{margin-bottom:14px}
.login-label{font-size:10px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:#7088a0;display:block;margin-bottom:6px}
.login-inp{width:100%;background:#eef6ff;border:2.5px solid #d0e8fa;border-radius:var(--r2);padding:12px 16px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:var(--navy);outline:none}
.login-inp:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(25,118,210,.12)}
.login-btn{width:100%;background:var(--navy);color:#fff;border:none;border-radius:var(--r2);padding:14px;font-family:'Fredoka One',cursive;font-size:18px;cursor:pointer;box-shadow:0 4px 0 var(--navy3);transition:transform .13s,box-shadow .13s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--navy3)}
.login-hint{text-align:center;margin-top:20px;font-size:11px;font-weight:700;color:#7088a0;background:#eef6ff;border-radius:var(--r);padding:12px 16px;border-left:3px solid var(--blue)}
.login-hint i{color:var(--blue);margin-right:6px}
.login-hint strong{color:var(--navy);font-weight:900}
.login-err{background:var(--red-lt);border:1.5px solid rgba(229,57,53,.3);border-radius:var(--r);padding:9px 13px;font-size:12px;font-weight:800;color:var(--red);margin-bottom:12px;display:none}
.login-err.show{display:block}
.back-link{text-align:center;margin-top:16px}
.back-link a{color:#7088a0;font-size:12px;font-weight:700;text-decoration:none;transition:color .2s}
.back-link a:hover{color:var(--blue)}
.spinner{width:18px;height:18px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.admin-info{font-size:11px;color:var(--ink3);margin-top:12px;text-align:center;padding:8px;background:var(--sky);border-radius:var(--r)}
.admin-info i{color:var(--gold)}
</style>
</head>
<body>
<div class="login-box">
  <div class="login-badge"><i class="fas fa-shield-alt"></i> Admin Portal</div>
  <div class="login-logo">Times<span>Dojo</span></div>
  <div class="login-sub">Command Centre — Authorised Access Only</div>
  <div class="login-err" id="loginErr"></div>
  <div class="login-field">
    <label class="login-label">Admin Username / Email</label>
    <input class="login-inp" id="loginEmail" type="text" placeholder="mesh or antoh">
  </div>
  <div class="login-field">
    <label class="login-label">Password</label>
    <input class="login-inp" id="loginPass" type="password" placeholder="••••••••">
  </div>
  <button class="login-btn" id="loginBtn"><i class="fas fa-lock"></i> Access Dashboard</button>
  <div class="login-hint">
    <i class="fas fa-key"></i> Secure Admin Access — Contact system administrator for credentials
  </div>
  <div class="back-link"><a href="{% url 'dojo:home' %}"><i class="fas fa-arrow-left"></i> Back to Home</a></div>
</div>
<script src="{% static 'dojo/js/csrf.js' %}"></script>
<script>
document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('loginPass').addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const err = document.getElementById('loginErr');
  err.classList.remove('show');
  
  if (!email || !pass) {
    err.textContent = 'Please enter both username and password';
    err.classList.add('show');
    return;
  }
  
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Authenticating…';
  
  try {
    const r = await fetch('/api/admin/login/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password: pass })
    });
    const data = await r.json();
    
    if (data.error) {
      err.textContent = data.error;
      err.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-lock"></i> Access Dashboard';
      return;
    }
    
    window.location.href = '/admin/dashboard/';
  } catch(e) {
    err.textContent = 'Network error. Please try again.';
    err.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-lock"></i> Access Dashboard';
  }
}
</script>
</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Video Call - TimesTable Dojo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #1a1a2e;
            height: 100vh;
            overflow: hidden;
        }
        .call-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #fff;
        }
        .meet-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            flex-direction: column;
            gap: 20px;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loading-text {
            color: #fff;
            font-size: 16px;
        }
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.8);
            padding: 12px 24px;
            border-radius: 99px;
            backdrop-filter: blur(8px);
        }
        .controls button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        .controls button:hover {
            transform: scale(1.1);
            background: rgba(255,255,255,0.3);
        }
        .end-call {
            background: #e53935 !important;
            color: #fff !important;
        }
        .end-call:hover {
            background: #c62828 !important;
        }
        .call-info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 8px 16px;
            border-radius: 99px;
            font-size: 14px;
            z-index: 20;
            backdrop-filter: blur(4px);
        }
        .instruction {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 15;
            background: rgba(0,0,0,0.8);
            padding: 24px;
            border-radius: 16px;
            color: #fff;
            max-width: 400px;
            width: 90%;
        }
        .instruction i {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
            color: var(--gold);
        }
        .instruction h3 {
            font-family: 'Fredoka One', cursive;
            margin-bottom: 12px;
        }
        .instruction p {
            margin-bottom: 16px;
            line-height: 1.5;
        }
        .instruction button {
            margin-top: 10px;
            padding: 10px 20px;
            background: var(--gold);
            border: none;
            border-radius: 99px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        .instruction a {
            color: var(--gold);
            text-decoration: none;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @media (max-width: 768px) {
            .controls button { width: 40px; height: 40px; font-size: 16px; }
            .controls { gap: 12px; padding: 8px 16px; }
            .instruction { padding: 20px; }
            .instruction i { font-size: 36px; }
        }
    </style>
</head>
<body>
    <div class="call-container">
        <div id="loadingOverlay" class="loading-overlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Preparing Google Meet...</div>
        </div>
        <iframe id="meetFrame" class="meet-frame" allow="camera; microphone; fullscreen" style="display:none"></iframe>
        <div class="controls">
            <button class="end-call" id="endCallBtn" title="End call">
                <i class="fas fa-phone-slash"></i>
            </button>
        </div>
        <div class="call-info" id="callInfo">
            <i class="fas fa-circle" style="font-size: 8px; color: #ff9800; margin-right: 6px;"></i>
            Joining Google Meet...
        </div>
        <div id="instructionOverlay" class="instruction" style="display:none;">
            <i class="fab fa-google"></i>
            <h3>Google Meet Video Call</h3>
            <p>Click the button below to join your video call. You'll need to allow camera and microphone access.</p>
            <button id="joinMeetBtn" class="btn-gold">Join Google Meet</button>
            <p style="font-size:12px; margin-top:16px; opacity:0.7;">
                <i class="fas fa-info-circle"></i> You'll be taken to Google Meet where you can start the video call.
            </p>
        </div>
    </div>

    <script>
        const meetingLink = "{{ meeting_link }}";
        const userName = "{{ user.get_full_name|default:'Student' }}";
        
        console.log('Meeting link:', meetingLink);
        
        let meetFrame = null;
        
        function startGoogleMeet() {
            const overlay = document.getElementById('instructionOverlay');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const meetFrameElement = document.getElementById('meetFrame');
            
            if (!meetingLink) {
                showError('No meeting link available. Please contact your tutor.');
                return;
            }
            
            // Hide instruction, show iframe
            overlay.style.display = 'none';
            loadingOverlay.style.display = 'flex';
            meetFrameElement.style.display = 'block';
            
            // Set iframe source
            meetFrameElement.src = meetingLink;
            
            // Hide loading after iframe loads
            meetFrameElement.onload = function() {
                setTimeout(() => {
                    loadingOverlay.style.display = 'none';
                    document.getElementById('callInfo').innerHTML = '<i class="fas fa-circle" style="font-size: 8px; color: #4caf50; margin-right: 6px;"></i> In Google Meet';
                }, 2000);
            };
        }
        
        function showError(message) {
            const overlay = document.getElementById('instructionOverlay');
            overlay.innerHTML = `
                <i class="fas fa-exclamation-triangle"></i>
                <h3>Error</h3>
                <p>${message}</p>
                <button onclick="window.location.href='/student-portal/'">Return to Dashboard</button>
            `;
            overlay.style.display = 'block';
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('callInfo').innerHTML = '<i class="fas fa-circle" style="font-size: 8px; color: #f44336; margin-right: 6px;"></i> Failed to join';
        }
        
        function endCall() {
            window.location.href = '/student-portal/';
        }
        
        // Event listeners
        document.getElementById('endCallBtn').addEventListener('click', endCall);
        document.getElementById('joinMeetBtn')?.addEventListener('click', startGoogleMeet);
        
        // Show instruction overlay first
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('instructionOverlay').style.display = 'block';
    </script>
</body>
</html>

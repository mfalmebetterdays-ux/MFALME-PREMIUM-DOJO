{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Password Reset Complete — Revision Dojo</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
:root{
  --sky:#eef6ff;--sky2:#d0e8fa;--ink:#1a2638;--ink2:#3b4d63;--ink3:#7088a0;
  --gold:#ffc107;--gold-dk:#e6a800;--navy:#1a3a6b;--blue:#1976d2;
  --green:#00b248;
  --r:10px;--r2:16px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:linear-gradient(155deg,var(--navy) 0%,#1565c0 55%,#0288d1 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-box{background:#fff;border-radius:22px;padding:32px 28px;width:100%;max-width:420px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.28)}
.auth-logo{font-family:'Fredoka One',cursive;font-size:26px;color:var(--navy);margin-bottom:20px}
.auth-logo span{color:var(--gold)}
.success-icon{font-size:64px;color:var(--green);margin-bottom:20px}
.success-title{font-family:'Fredoka One',cursive;font-size:24px;color:var(--navy);margin-bottom:12px}
.success-message{font-size:14px;color:var(--ink2);margin-bottom:24px;line-height:1.6}
.btn{font-family:'Fredoka One',cursive;font-size:17px;border:none;cursor:pointer;padding:12px 26px;border-radius:var(--r2);display:inline-flex;align-items:center;justify-content:center;gap:7px;text-decoration:none;transition:transform .13s,box-shadow .13s}
.btn-gold{background:var(--gold);color:var(--navy);box-shadow:0 4px 0 var(--gold-dk)}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--gold-dk)}
</style>
</head>
<body>
<div class="auth-box">
  <div class="auth-logo">Revision<span>Dojo</span></div>
  <div class="success-icon">
    <i class="fas fa-check-circle"></i>
  </div>
  <div class="success-title">Password Reset Complete!</div>
  <div class="success-message">
    Your password has been successfully reset.<br>
    You can now log in with your new password.
  </div>
  <a href="{% url 'dojo:login' %}" class="btn btn-gold" style="width:100%">
    <i class="fas fa-sign-in-alt"></i> Sign In
  </a>
</div>
</body>
</html>
